<style>
  /* Tooltip text */
  #tooltiptext {
    visibility: hidden;
    background-color: white;
    color: #000;
    text-align: left;
    margin: 10px;
    padding: 16px;
    border-radius: 4px;
    left: 48%;
    /* Position the tooltip text - see examples below! */
    position: absolute;
    z-index: 1;
  }

  #tooltiptext:after {
    content: '';
    position: absolute;
    display: block;
    width: 0;
    z-index: 1;
    border-style: solid;
    border-color: #ffffff transparent;
    border-width: 10px 10px 0;
    bottom: -10px;
    left: 50%;
    margin-left: -10px;
  }

  #tooltip {
    background-image: url("https://www.ordnancesurvey.co.uk/img-assets/products/overview-england-wales.x4fa67183.xe4e2d2f0.jpg");
    background-size: cover;
    height: 700px;
    width: 100%;
    background-color: rgb(188, 214, 188);
    text-align: center;
    padding-top: 400px;
  }

  .layout-slots__divider {
    color: #ffffff;
  }

  a {
    color: #1d70b8;
  }

  .grey-box {
    display: none;
  }

  .filter {
    background-color: #f3f2f1;
    padding: 8px;
    border-radius: 5px;
    margin-left: 10px;
    border: 1px solid #505a5f;
    text-decoration: none;
    color: black;
  }

  .filters {
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 1px solid #b1b4b6;
  }

  .filters .govuk-details__text {
    border: none;
    padding-left: 0;
  }

  .filtersText {
    text-decoration: none;
    color: #000;
    font-weight: 700;
    font-size: 1.1875rem;
  }

  .filter:visited {
    color: black;
  }



  .greybg {
    box-shadow: #f3f2f1 800px 0px, #f3f2f1 -800px 0;
  }

  .listbox {
    border: 1px solid rgb(147, 147, 147);
    padding: 16px;
    margin: 12px;
    transform: translateY(600px);
    position: absolute;
    background-color: white;
    width: 554px;
  }

  .govuk-details__summary::before {
    clip-path: polygon(6.38% 22.63%, 49.5% 65.75%, 92.63% 22.63%, 100% 30%, 50% 80%, 0% 30%);
    background-color: black;
    color: black;
    width: 3px;
    height: 3px;
    background-color: black;
    color: black;
  }

  .govuk-details[open]>.govuk-details__summary::before {
    clip-path: polygon(0% 71.88%, 49.5% 22.63%, 98.5% 71.88%, 91.63% 78.71%, 50% 36.88%, 7.37% 79.29%);
    width: 3px;
    height: 3px;
  }
</style>

<details class="govuk-details govuk-!-margin-top-3" id="filter-panel">
  <div style="background-color:#F3F2F1; padding:20px;">
    <details class="govuk-details govuk-!-margin-bottom-0" id="filter-panel">
      <summary class="govuk-details__summary" style="width:96%;">
        <h3 class="govuk-heading-s" style="display:flex; justify-content:space-between; align-items:center;">

          <span>Appeal type</span>

          <span id="type-count"
            style="font-size:16px; font-weight: normal; margin-right: 16px; margin-left: 16px; text-align: right; display:none;">
            0 selected
          </span>

        </h3>
      </summary>
      <div style="padding-left:30px;">
        <form class="govuk-form-group">
          <fieldset class="govuk-fieldset">
            <div class="govuk-grid-row">
              <div class="">
                <fieldset class="govuk-fieldset" aria-describedby="type-of-application-hint">
                  <div class="govuk-checkboxes govuk-checkboxes--small">
                    <div class="govuk-checkboxes__item">
                      <input class="govuk-checkboxes__input" id="type-1" name="type" type="checkbox"
                        value="Planning permission">
                      <label class="govuk-label govuk-checkboxes__label" for="type-1">
                        Householder
                      </label>
                    </div>
                    <div class="govuk-checkboxes__item">
                      <input class="govuk-checkboxes__input" id="type-2" name="type" type="checkbox"
                        value="Outline planning permission with some matters reserved">
                      <label class="govuk-label govuk-checkboxes__label" for="type-2">
                        Planning
                      </label>
                    </div>
                    <div class="govuk-checkboxes__item">
                      <input class="govuk-checkboxes__input" id="type-3" name="type" type="checkbox"
                        value="Approval of reserved matters following outline approval">
                      <label class="govuk-label govuk-checkboxes__label" for="type-3">
                        Planned listed building and conservation area
                      </label>
                    </div>
                    <div class="govuk-checkboxes__item">
                      <input class="govuk-checkboxes__input" id="type-4" name="type" type="checkbox"
                        value="Planning permission and listed building consent (LBC)">
                      <label class="govuk-label govuk-checkboxes__label" for="type-4">
                        Advertisement
                      </label>
                    </div>
                  </div>
                </fieldset>
              </div>
            </div>
          </fieldset>
        </form>
      </div>
    </details>
    <hr class="govuk-section-break govuk-section-break--s govuk-section-break--visible">

    <details class="govuk-details govuk-!-margin-top-3 govuk-!-margin-padding-0 govuk-!-margin-bottom-0"
      id="filter-panel">
      <summary class="govuk-details__summary" style="width:96%;">
        <h3 class="govuk-heading-s" style="display:flex; justify-content:space-between; align-items:center;">

          <span>Procedure type</span>

          <span id="stage-count"
            style="font-size:16px; font-weight: normal; margin-right: 16px; margin-left: 16px; text-align: right; display:none;">
            0 selected
          </span>

        </h3>
      </summary>
      <div style="padding-left:30px;">
        <form class="govuk-form-group">
          <fieldset class="govuk-fieldset">
            <div class="govuk-grid-row">
              <div class="">
                <fieldset class="govuk-fieldset" aria-describedby="stage-hint">
                  <div class="govuk-checkboxes govuk-checkboxes--small">
                    <div class="govuk-checkboxes__item">
                      <input class="govuk-checkboxes__input" id="stage-written" name="stage" type="checkbox"
                        value="Written representations">
                      <label class="govuk-label govuk-checkboxes__label" for="stage-written">
                        Written representations
                      </label>
                    </div>
                    <div class="govuk-checkboxes__item">
                      <input class="govuk-checkboxes__input" id="stage-hearing" name="stage" type="checkbox"
                        value="Hearing">
                      <label class="govuk-label govuk-checkboxes__label" for="stage-hearing">
                        Hearing
                      </label>
                    </div>
                    <div class="govuk-checkboxes__item">
                      <input class="govuk-checkboxes__input" id="stage-inquiry" name="stage" type="checkbox"
                        value="Inquiry">
                      <label class="govuk-label govuk-checkboxes__label" for="stage-inquiry">
                        Inquiry
                      </label>
                    </div>

                  </div>
                </fieldset>
              </div>
              <div class="govuk-grid-column-one-third"></div>
            </div>

          </fieldset>
        </form>
      </div>
    </details>
    <button id="apply-filters" class="govuk-button" style="margin-bottom:0px; width:100%">
      Apply
    </button>
  </div>

  <summary class="govuk-details__summary">
    <span class="govuk-details__summary-text">
      Filter appeals
    </span>
  </summary>

</details>

<div class="filters" id="active-filters" style="display:none;">
  <p class="govuk-body">Active filters</p>

  <div id="filter-chips" style="margin-top:10px;"></div>

  <div style="margin-top:20px;">
    <a href="#" id="clear-filters">Clear all filters</a>
  </div>
</div>

<script>

  const applyBtn = document.getElementById("apply-filters")
  const chipsContainer = document.getElementById("filter-chips")
  const activeFilters = document.getElementById("active-filters")
  const clearBtn = document.getElementById("clear-filters")

  applyBtn.addEventListener("click", function (e) {

    e.preventDefault()

    chipsContainer.innerHTML = ""

    const checked = document.querySelectorAll("#filter-panel input[type='checkbox']:checked")

    if (checked.length === 0) {
      activeFilters.style.display = "none"
      return
    }

    activeFilters.style.display = "block"

    checked.forEach(input => {

      const label = document.querySelector(`label[for="${input.id}"]`).innerText

      const chip = document.createElement("span")
      chip.className = "filter"

      chip.innerHTML = `
        <button data-id="${input.id}" style="border:none;background:none;font-size:18px;margin-right:6px;cursor:pointer;">×</button>
        ${label}
      `

      chipsContainer.appendChild(chip)

    })

  })

  chipsContainer.addEventListener("click", function (e) {

    if (e.target.dataset.id) {

      const id = e.target.dataset.id

      document.getElementById(id).checked = false

      e.target.parentElement.remove()

      if (chipsContainer.children.length === 0) {
        activeFilters.style.display = "none"
      }

    }

  })

  clearBtn.addEventListener("click", function (e) {

    e.preventDefault()

    document.querySelectorAll("#filter-panel input[type='checkbox']").forEach(cb => {
      cb.checked = false
    })

    chipsContainer.innerHTML = ""
    activeFilters.style.display = "none"

  })

  document.getElementById("apply-filters").addEventListener("click", function (e) {

    e.preventDefault()

    const typeChecked = document.querySelectorAll("input[name='type']:checked").length
    const stageChecked = document.querySelectorAll("input[name='stage']:checked").length

    const typeCount = document.getElementById("type-count")
    const stageCount = document.getElementById("stage-count")

    if (typeChecked > 0) {
      typeCount.textContent = typeChecked + " selected"
      typeCount.style.display = "inline"
    } else {
      typeCount.style.display = "none"
    }

    if (stageChecked > 0) {
      stageCount.textContent = stageChecked + " selected"
      stageCount.style.display = "inline"
    } else {
      stageCount.style.display = "none"
    }

  })


</script>
